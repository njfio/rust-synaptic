name: Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Buildable CI feature set: every pure-Rust feature. Excludes features that
  # need system libraries or hardware unavailable on standard runners —
  # `cuda` (CUDA), `image-processing` (OpenCV/Tesseract), `audio-processing`
  # (ALSA/whisper), `visualization` (fontconfig), `mobile` (NDK/Swift), `wasm`.
  # `--all-features` cannot compile on a hosted runner because of those.
  CI_FEATURES: "security,zero-knowledge-proofs,homomorphic-encryption,sql-storage,static-embeddings,ml-models,reranker-model,llm-reasoning,code-analysis,document-processing,mcp,test-utils"

jobs:
  formatting:
    name: Check Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  linting:
    name: Clippy Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Run clippy
        run: cargo clippy --all-targets --features "${{ env.CI_FEATURES }}" -- -D warnings

  documentation:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-doc-${{ hashFiles('**/Cargo.lock') }}
      - name: Check documentation
        run: cargo doc --no-deps --document-private-items --features "${{ env.CI_FEATURES }}"
        env:
          RUSTDOCFLAGS: -D warnings

  # Advisory-only: surfaces RustSec advisories but does NOT gate the pipeline.
  # The tree carries transitive CVEs with no patched release available (e.g.
  # RUSTSEC-2023-0071 in `rsa`, pulled in via sqlx); blocking on them would
  # wedge CI on issues we cannot fix from this repo. Review the report and add
  # reviewed IDs to `deny.toml`'s `[advisories] ignore` when triaged.
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v1.4.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-deny
        run: cargo install cargo-deny
      - name: Check dependencies
        run: cargo deny check

  code-coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin
      - name: Generate coverage
        run: cargo tarpaulin --out xml --engine llvm --timeout 300 --features "${{ env.CI_FEATURES }}"
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./cobertura.xml
          # Coverage upload is informational; a Codecov outage or a missing
          # token must not fail the pipeline.
          fail_ci_if_error: false

  # Cross-platform portability: DEFAULT features only. The full CI feature set
  # includes crypto/ML crates (tfhe, candle, bellman) whose cross-platform build
  # support varies; those are exercised on Linux by `test-features` below. This
  # matrix guarantees the core builds and tests everywhere.
  test-matrix:
    name: Test Matrix
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable, beta]
        exclude:
          # Reduce matrix size for faster CI
          - os: windows-latest
            rust: beta
          - os: macos-latest
            rust: beta
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.rust }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      # Library unit tests only: deterministic and portable. Integration tests
      # (some depend on approximate-ANN recall or wall-clock timing) run on
      # Linux in `test-features`, where failures are reproducible/debuggable.
      - name: Run library tests (default features)
        run: cargo test --lib

  # Full CI feature set (crypto/ML/etc.) on Linux, where those crates build.
  test-features:
    name: Test (all CI features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-featuretest-${{ hashFiles('**/Cargo.lock') }}
      - name: Run tests
        run: cargo test --features "${{ env.CI_FEATURES }}"

  # Non-blocking while 11 TODO markers remain in src/ (as of Phase 7);
  # flip to a hard failure once the count reaches zero.
  check-todos:
    name: Check for TODO/FIXME in production code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for TODO/FIXME comments
        run: |
          if grep -r "TODO\|FIXME" src/ --exclude="*.md"; then
            echo "Warning: Found TODO/FIXME comments in production code"
            # Don't fail CI, just warn
          fi

  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    # security-audit / dependency-check are advisory-only (see their comment)
    # and intentionally excluded from the blocking gate.
    needs: [formatting, linting, documentation]
    steps:
      - name: Quality check passed
        run: echo "All quality checks passed!"

  performance-check:
    name: Performance Regression Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    # Benchmark timing in shared CI runners is noisy; this is an advisory
    # signal, not a merge gate.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Install criterion
        run: cargo install cargo-criterion
      - name: Run benchmarks
        run: cargo criterion --message-format=json > benchmark-results.json
      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'cargo'
          output-file-path: benchmark-results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          comment-on-alert: true
          alert-threshold: '110%'
          fail-on-alert: false
